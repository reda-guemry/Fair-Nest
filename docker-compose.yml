version: '3.8'

services: 

  app : 
    build :
      context: . 
      dockerfile: Docker/Dockerfile 
    image: fair-nest-app
    container_name: fair-nest-app
    env_file : 
      - .env
    volumes :  
      - .:/var/www/html
    depends_on : 
      - postgres 
  web : 
    image : nginx:alpine 
    container_name : fair-nest-web
    ports : 
      - "8080:80"
    volumes : 
      - .:/var/www/html 
      - ./Docker/vhost.conf:/etc/nginx/conf.d/default.conf
    depends_on : 
      - app

  postgres : 
    image : postgres:15-alpine
    container_name : fair-nest-postgres
    environment : 
      POSTGRES_DB: fair_nest
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
    ports : 
      - "5432:5432"
    volumes : 
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data: 
    




  

    


